name: HARDGATE Alert Notify

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: hardgate-alert-notify
  cancel-in-progress: false

jobs:
  check-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer@23

      - name: Run alert check against the live site
        run: node scripts/alert-check.mjs

      - name: Commit updated alert state if it changed
        run: |
          git config user.name "hardgate-bot"
          git config user.email "actions@users.noreply.github.com"
          git add alert-state.json
          git diff --cached --quiet || git commit -m "chore: update alert state [skip ci]"
          git push
